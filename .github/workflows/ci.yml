name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts

  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash -n scripts/install.sh
      - run: node --check npm/bin/metaclaw-install.js

  node-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm test

  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install --upgrade pip setuptools wheel
      - run: python -m pip install -e "metaclaw/metaclaw[dev]"
      - run: python -m pytest metaclaw/metaclaw/tests -q

  npm-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm pack --dry-run

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: mig4/setup-bats@v1
        with:
          bats-version: 1.11.0
      - run: bats tests/install.bats

  fresh-install-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: git branch smoke-install
      - name: Install from a fresh HOME
        run: |
          set -euo pipefail
          export HOME="$RUNNER_TEMP/metaclaw-home"
          mkdir -p "$HOME"
          bash scripts/install.sh \
            --repo "file://$GITHUB_WORKSPACE" \
            --branch smoke-install \
            --dir "$HOME/.metaclaw/src" \
            --workspace "$HOME/.metaclaw/workspace" \
            --bin-dir "$HOME/.local/bin"
          "$HOME/.local/bin/metaclaw" help
          test -f "$HOME/.metaclaw/workspace/config.json"
          test ! -f "$HOME/.metaclaw/src/metaclaw/metaclaw/config.json"
