name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: release_notes
        run: |
          # Extract version from tag
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Generate release notes from CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            # Extract section for this version
            awk "/^## \[$VERSION\]/ {flag=1; next} /^## \[/ {flag=0} flag" CHANGELOG.md > release_notes.md || true
            if [ -s release_notes.md ]; then
              cat release_notes.md
            else
              echo "See CHANGELOG.md for full release notes."
            fi
          else
            echo "Release $VERSION"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Bats
        uses: mig4/setup-bats@v1
        with:
          bats-version: 1.11.0

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e "metaclaw/metaclaw[dev]"

      - name: Run Release Checks
        run: |
          bash -n scripts/install.sh
          node --check npm/bin/metaclaw-install.js
          shellcheck scripts/install.sh
          npm test
          bats tests/install.bats
          python -m pytest metaclaw/metaclaw/tests -q
          npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
