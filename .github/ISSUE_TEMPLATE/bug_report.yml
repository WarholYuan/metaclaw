name: Bug Report
description: Report a bug in MetaClaw
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened?
      placeholder: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `curl -fsSL ... | bash`
        2. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: MetaClaw Version
      description: Run `npm view @mianhuatang913/metaclaw version` or check package.json
      placeholder: "0.2.0"

  - type: dropdown
    id: install-method
    attributes:
      label: Installation Method
      options:
        - curl
        - npx
        - GitHub npx
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 14.2, Ubuntu 22.04, etc."
    validations:
      required: true

  - type: input
    id: shell
    attributes:
      label: Shell
      placeholder: "bash 5.2, zsh 5.9, etc."

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other relevant information
